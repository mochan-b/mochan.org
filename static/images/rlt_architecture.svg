<svg width="600" height="680" viewBox="0 0 600 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2px; rx: 8px; }
      .vla { fill: #e0f2fe; stroke: #38bdf8; }
      .rl-token { fill: #fef3c7; stroke: #fbbf24; }
      .actor { fill: #dcfce7; stroke: #4ade80; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-anchor: middle; fill: #334155; }
      .title { font-weight: 600; font-size: 16px; }
      .label-right { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: #64748b; text-anchor: start; }
      .arrow { stroke: #94a3b8; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background for visibility in both dark and light modes -->
  <rect width="100%" height="100%" fill="#ffffff" rx="12" />

  <!-- Input -->
  <rect x="100" y="40" width="200" height="46" class="box" />
  <text x="200" y="68" class="text title">State s, Language ℓ</text>

  <line x1="200" y1="86" x2="200" y2="126" class="arrow" />

  <!-- VLA -->
  <rect x="100" y="126" width="200" height="60" class="box vla" />
  <text x="200" y="162" class="text title">Pretrained VLA</text>

  <line x1="200" y1="186" x2="200" y2="246" class="arrow" />
  <text x="215" y="220" class="label-right">(Final-layer token embeddings: z₁, ..., z_M)</text>

  <!-- Append -->
  <rect x="130" y="246" width="140" height="46" class="box" />
  <text x="200" y="274" class="text title">Append</text>

  <!-- Learned Embedding -->
  <rect x="340" y="246" width="240" height="46" class="box rl-token" />
  <text x="460" y="274" class="text title">Learned RL Embedding: &lt;rl&gt;</text>

  <line x1="340" y1="269" x2="270" y2="269" class="arrow" />

  <line x1="200" y1="292" x2="200" y2="352" class="arrow" />
  <text x="215" y="326" class="label-right">(Augmented sequence)</text>

  <!-- Encoder -->
  <rect x="90" y="352" width="220" height="66" class="box vla" />
  <text x="200" y="380" class="text title">Lightweight</text>
  <text x="200" y="402" class="text title">Encoder Transformer</text>

  <line x1="200" y1="418" x2="200" y2="478" class="arrow" />
  <text x="215" y="452" class="label-right">(Output at special-token position)</text>

  <!-- RL Token -->
  <rect x="120" y="478" width="160" height="54" class="box rl-token" />
  <text x="200" y="511" class="text title">RL Token</text>

  <line x1="200" y1="532" x2="200" y2="572" class="arrow" />

  <!-- Proprioceptive State -->
  <rect x="300" y="478" width="140" height="54" class="box" />
  <text x="370" y="502" class="text title">Proprioceptive</text>
  <text x="370" y="522" class="text title">State</text>

  <line x1="370" y1="532" x2="370" y2="572" class="arrow" />

  <!-- VLA Action Chunk -->
  <rect x="455" y="478" width="130" height="54" class="box vla" />
  <text x="520" y="502" class="text title">VLA Action</text>
  <text x="520" y="522" class="text title">Chunk</text>

  <line x1="520" y1="532" x2="520" y2="572" class="arrow" />

  <!-- Actor/Critic -->
  <rect x="90" y="572" width="495" height="66" class="box actor" />
  <text x="337" y="600" class="text title">Online RL Actor &amp; Critic</text>
  <text x="337" y="622" class="text title">(Refines actions to maximize predicted success)</text>

</svg>
